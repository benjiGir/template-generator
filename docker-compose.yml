services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: docforge
      POSTGRES_USER: docforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docforge -d docforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgres://docforge:${DB_PASSWORD}@db:5432/docforge
      PORT: 3001
      CORS_ORIGIN: http://localhost:${WEB_PORT:-8080}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ""
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
